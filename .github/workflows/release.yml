name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v0.1.0

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12 # Stable version for PyInstaller

      - name: Install dependencies
        run: uv sync

      - name: Build Executable
        run: uv run pyinstaller storyforge.spec --clean -y

      - name: Create Installer (Inno Setup)
        run: |
          # Use the ISCC compiler included in windows-latest
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" storyforge.iss

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/StoryForge/StoryForge.exe
            installer/StoryForge_Setup.exe
          name: StoryForge ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
