name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential git zip unzip autoconf libtool \
            libffi-dev libssl-dev libbz2-dev libreadline-dev \
            libsqlite3-dev zlib1g-dev libltdl-dev

      - name: Install buildozer and Cython
        run: pip install --upgrade buildozer cython==0.29.37

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-${{ runner.os }}
          restore-keys: buildozer-

      - name: Build APK
        run: buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StoryForge-Android
          path: bin/*.apk
