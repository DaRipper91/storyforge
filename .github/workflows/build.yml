name: Build and Release

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.2"   # matches project.godot config/features

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Export Godot client (Windows) ───────────────────────────────────────
  godot-export-windows:
    name: Export Godot (Windows)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot + export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Import project (generate .import cache)
        run: |
          mkdir -p dist
          godot --headless --path godot --import 2>&1 | tail -5 || true

      - name: Export Windows Desktop
        run: |
          mkdir -p dist
          godot --headless --path godot \
            --export-release "Windows Desktop" \
            "../../dist/StoryForge_client.exe" 2>&1

      - name: Upload Godot Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: StoryForge-Godot-Windows
          path: dist/StoryForge_client.exe

  # ── 2. Build Python launcher (Windows) ─────────────────────────────────────
  python-build-windows:
    name: Build Python Launcher (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Write OAuth client secret
        shell: bash
        run: |
          if [ -n "${{ secrets.OAUTH_CLIENT_SECRET }}" ]; then
            echo '${{ secrets.OAUTH_CLIENT_SECRET }}' > client_secret.json
          fi

      - name: Install dependencies
        run: uv sync --group dev --python 3.12

      - name: Build StoryForge.exe
        run: uv run --python 3.12 python scripts/build.py

      - name: Upload Python launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: StoryForge-Launcher-Windows
          path: dist/StoryForge.exe

  # ── 3. Package release zip (Windows) ───────────────────────────────────────
  package-windows:
    name: Package Windows Release
    runs-on: ubuntu-22.04
    needs: [ godot-export-windows, python-build-windows ]
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot client
        uses: actions/download-artifact@v4
        with:
          name: StoryForge-Godot-Windows
          path: dist/

      - name: Download Python launcher
        uses: actions/download-artifact@v4
        with:
          name: StoryForge-Launcher-Windows
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Assemble release zip
        run: python scripts/package_release.py

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: StoryForge-Windows-Release
          path: dist/StoryForge_v*.zip

  # ── 4. Export Godot client (Linux) ─────────────────────────────────────────
  godot-export-linux:
    name: Export Godot (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot + export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: |
          mkdir -p dist
          godot --headless --path godot --import 2>&1 | tail -5 || true

      - name: Export Linux
        run: |
          mkdir -p dist
          godot --headless --path godot \
            --export-release "Linux/X11" \
            "../../dist/StoryForge_client_linux" 2>&1

      - name: Upload Linux Godot artifact
        uses: actions/upload-artifact@v4
        with:
          name: StoryForge-Godot-Linux
          path: dist/StoryForge_client_linux

  # ── 5. Build Python launcher (Linux) ───────────────────────────────────────
  python-build-linux:
    name: Build Python Launcher (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system deps (for cryptography wheel)
        run: sudo apt-get install -y -qq libffi-dev

      - name: Install dependencies
        run: uv sync --group dev --python 3.12

      - name: Build StoryForge (Linux)
        run: uv run --python 3.12 python scripts/build.py

      - name: Upload Linux launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: StoryForge-Launcher-Linux
          path: dist/StoryForge

  # ── 6. GitHub Release (tag pushes only) ────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ package-windows, python-build-linux, godot-export-linux ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "StoryForge ${{ github.ref_name }}"
          body: |
            ## StoryForge: The Feral World ${{ github.ref_name }}

            ### Windows
            1. Download `StoryForge_*_Windows.zip`
            2. Extract the zip
            3. Copy `.env.example` → `.env` and add your [Gemini API key](https://aistudio.google.com/)
            4. Double-click `StoryForge.exe`

            ### Linux
            1. Download `StoryForge` (launcher) and `StoryForge_client_linux` (Godot)
            2. Place both in the same directory, make them executable (`chmod +x`)
            3. Set up `.env` with your Gemini API key
            4. Run `./StoryForge`

            ### Controls
            | Input | Action |
            |-------|--------|
            | Right-drag | Orbit camera |
            | Scroll | Zoom |
            | R | Reset camera |
          files: |
            release/*.zip
            release/StoryForge
            release/StoryForge_client_linux

  # ── 7. Publish to itch.io (tag pushes only) ────────────────────────────────
  itch-publish:
    name: Publish to itch.io
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v') && vars.ITCH_USER != ''
    needs: package-windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: StoryForge-Windows-Release
          path: dist/

      - name: Install butler
        run: |
          curl -L -o butler.zip \
            "https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default"
          unzip butler.zip
          chmod +x butler

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push dist/StoryForge_v*.zip \
            "${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}:windows" \
            --userversion "${{ github.ref_name }}"
