name: Windows Quick Build

# Lightweight per-push Windows build — produces StoryForge.exe artifact.
# For the full release pipeline (Godot export + zip + itch.io), see build.yml.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev --python 3.12

      - name: Write OAuth client secret
        shell: bash
        run: |
          if [ -n "${{ secrets.OAUTH_CLIENT_SECRET }}" ]; then
            echo '${{ secrets.OAUTH_CLIENT_SECRET }}' > client_secret.json
          fi

      - name: Build StoryForge.exe
        run: uv run --python 3.12 python scripts/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StoryForge-Windows-Launcher
          path: dist/StoryForge.exe

      - name: Create pre-release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-dev
          name: "StoryForge (latest dev build)"
          prerelease: true
          body: |
            **Automated dev build** from the latest commit on `main`.

            > This is the Python launcher only. The Godot client is not included.
            > For a complete playable build, wait for a versioned release (`v*` tag).

            ### Tester notes
            - Requires Godot 4 installed and in PATH (or `GODOT_PATH` env var)
            - Requires a `.env` file with `STORYFORGE_GEMINI_API_KEY`
          files: dist/StoryForge.exe
