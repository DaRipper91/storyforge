name: Windows Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev --python 3.12

      - name: Create client_secret.json from Secret
        shell: bash
        run: echo '${{ secrets.OAUTH_CLIENT_SECRET }}' > client_secret.json

      - name: Build with PyInstaller
        run: uv run --python 3.12 python scripts/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StoryForge-Windows
          path: dist/StoryForge.exe

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.1
          name: StoryForge v0.1.1 (Windows)
          body: |
            ## StoryForge: Feral Successors Update
            
            This release introduces the **Google OAuth2 Desktop Flow** and pins the AI DM engine to **Gemini 3.5 Flash** for peak performance.
            
            ### Tester Instructions:
            1. Download `StoryForge.exe` below.
            2. Launch the application.
            3. On first login, Google may show an "Unverified App" screen. 
            4. **Action Required**: Click **"Advanced"** -> **"Go to StoryForge (unsafe)"** to proceed with authentication.
          files: dist/StoryForge.exe
