name: "storyforge"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
release: 1
section: "games"
priority: "extra"
maintainer: "StoryForge Maintainer"
description: "Hybrid VTT + AI Dungeon Master for family D&D 5e"
vendor: "StoryForge"
homepage: "https://github.com/daripper/storyforge"
license: "MIT"
contents:
  - src: "dist/StoryForge"
    dst: "/usr/bin/storyforge"
  - src: "frontend/icon.svg"
    dst: "/usr/share/icons/hicolor/scalable/apps/storyforge.svg"
overrides:
  deb:
    depends:
      - libgtk-3-0
      - libwebkit2gtk-4.1-0
  rpm:
    depends:
      - gtk3
      - webkit2gtk3
